<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product View</title>

<style>
    body {
        margin: 0;
        padding: 40px 20px;
        background: linear-gradient(135deg, #f6f7fb, #eef1f7);
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
    }

    .product-card {
        width: 100%;
        max-width: 520px;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        overflow: hidden;
        transition: transform 0.2s ease;
    }

    .product-card:hover {
        transform: translateY(-3px);
    }

    .product-header {
        padding: 24px;
        border-bottom: 1px solid #eee;
        text-align: center;
    }

    .product-title {
        font-size: 26px;
        font-weight: 700;
        margin: 0;
        color: #222;
        letter-spacing: 0.3px;
    }

    .product-body {
        padding: 22px 26px;
    }

    .product-meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 18px;
    }

    .badge {
        flex: 1;
        background: #f4f6f8;
        padding: 10px 12px;
        border-radius: 10px;
        text-align: center;
        font-size: 14px;
        color: #444;
    }

    .badge strong {
        display: block;
        font-size: 15px;
        color: #111;
        margin-top: 4px;
    }

    .product-description {
        font-size: 15px;
        line-height: 1.7;
        color: #555;
        margin-top: 10px;
        text-align: justify;
    }

    .product-footer {
        padding: 18px 26px;
        border-top: 1px solid #eee;
        display: flex;
        justify-content: center;
    }

    .btn {
        background: #111;
        color: #fff;
        padding: 10px 18px;
        border-radius: 10px;
        font-size: 14px;
        text-decoration: none;
        transition: 0.2s ease;
    }

    .btn:hover {
        background: #333;
    }

    @media (max-width: 600px) {
        .product-meta {
            flex-direction: column;
        }
    }
</style>
</head>

<body>

<div class="product-card">

    <div class="product-header">
        <h1 class="product-title">{{ pro.title }}</h1>
    </div>

    <div class="product-body">

        <div class="product-meta">
            <div class="badge">
                Price
                <strong>{{ pro.price }}</strong>
            </div>

            <div class="badge">
                Quantity
                <strong>{{ pro.quantity }}</strong>
            </div>
        </div>

        <div class="product-description">
            {{ pro.description }}
        </div>

    </div>

</div>

</body>
</html>
