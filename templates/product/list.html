{% extends 'base.html' %}
{% block content %}

<style>
    body {
        background: #f6f7fb;
    }

    .product-container {
        display: grid;
        grid-template-columns: repeat(5, 1fr); /* 👈 STRICT 5 COLUMNS */
        gap: 18px;
        padding: 24px;
    }

    .product-card {
        background: #ffffff;
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.06);
        transition: all 0.25s ease;
        display: flex;
        flex-direction: column;
    }

    .product-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 28px rgba(0,0,0,0.12);
    }

    .product-title {
        font-size: 16px;
        font-weight: 700;
        color: #222;
        margin-bottom: 8px;
        line-height: 1.3;
    }

    .badges {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        gap: 8px;
    }

    .badge {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 20px;
        background: #f1f5f9;
        color: #444;
        flex: 1;
        text-align: center;
    }

    .price {
        background: #e8f7ee;
        color: #1a7f37;
        font-weight: 600;
    }

    .qty {
        background: #eef2ff;
        color: #3730a3;
    }

    .product-desc {
        font-size: 13px;
        color: #666;
        line-height: 1.5;
        margin-bottom: 12px;

        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .product-meta {
        font-size: 11px;
        color: #9aa0a6;
        margin-top: auto;
        border-top: 1px solid #f1f1f1;
        padding-top: 8px;
    }

    .bottom-row {
        display: flex;
        gap: 6px;
        margin-top: 10px;
    }

    .btn {
        flex: 1;
        text-align: center;
        font-size: 12px;
        padding: 8px 10px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.2s ease;
    }

    .btn-read {
        background: #111;
        color: #fff;
    }

    .btn-read:hover {
        background: #333;
    }

    .btn-update {
        background: #f1f5ff;
        color: #1d4ed8;
    }

    .btn-update:hover {
        background: #dbeafe;
    }

    .btn-delete {
        background: #fff1f2;
        color: #e11d48;
    }

    .btn-delete:hover {
        background: #ffe4e6;
    }
</style>

<div class="product-container">

    {% for p in pro %}
    <div class="product-card">
        <div class="product-title">#{{ p.id }}</div>
        <div class="product-title">{{ p.title }}</div>

        <div class="badges">
            <div class="badge price">${{ p.price }}</div>
            <div class="badge qty">Qty: {{ p.quantity }}</div>
        </div>

        <div class="product-desc">
            {{ p.description }}
        </div>

        <div class="product-meta">
            Created at {{ p.created_at|date:"Y-m-d" }}
            Updated at {{ p.updated_at|date:"Y-m-d" }}
        </div>

        <div class="bottom-row">
            <a href="{% url 'read' p.pk %}" class="btn btn-read">View</a>
            <a href="{% url 'update' p.pk %}" class="btn btn-update">Edit</a>
            <a href="{% url 'delete' p.pk %}" class="btn btn-delete">Delete</a>
        </div>

    </div>
    {% endfor %}

</div>

{% endblock %}
